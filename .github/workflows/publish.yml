name: Publish

# Publish the three crates to crates.io in dependency order. Runs on a
# `vX.Y.Z` tag push (alongside release.yml), or manually via workflow_dispatch.
#
# The tag push — not `release: published` — is the trigger on purpose: a
# GitHub Release created by release.yml uses the default GITHUB_TOKEN, and
# GitHub does not let GITHUB_TOKEN-created events cascade-trigger other
# workflows, so a `release: published` handler would never fire. Keying off
# the tag push (done by a human/PAT) avoids that. Publishing is independent of
# the release binaries, so running in parallel with release.yml is fine.
#
# Auth is crates.io Trusted Publishing (OIDC) — no long-lived token. Setup per
# crate on crates.io: add this repo + this workflow (`publish.yml`) as a
# Trusted Publisher for `vgi-core`, `verify-trust`, and `did-git-sign`.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for crates.io Trusted Publishing
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev libdbus-1-dev

      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          # vgi-core has no internal deps; verify-trust and did-git-sign both
          # depend on it. `cargo publish` waits for each crate to appear in
          # the index before returning, so the next one resolves it.
          for crate in vgi-core verify-trust did-git-sign; do
            echo "::group::publish ${crate}"
            cargo publish -p "${crate}" --locked
            echo "::endgroup::"
          done
