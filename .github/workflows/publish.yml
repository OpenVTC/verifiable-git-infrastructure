name: Publish

# Publish the three crates to crates.io in dependency order. Runs when a
# GitHub Release is published (the `release.yml` pipeline creates it on a
# `vX.Y.Z` tag), or manually via workflow_dispatch.
#
# Auth is crates.io Trusted Publishing (OIDC) — no long-lived token. This
# requires a one-time setup per crate on crates.io: add this repo + this
# workflow as a Trusted Publisher for `vgi-core`, `verify-trust`, and
# `did-git-sign`. A brand-new crate name has no owner yet, so the *first*
# publish of each name may need a manual token-based `cargo publish` to
# establish it; trusted publishing covers every release after that.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for crates.io Trusted Publishing
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev libdbus-1-dev

      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          # vgi-core has no internal deps; verify-trust and did-git-sign both
          # depend on it. `cargo publish` waits for each crate to appear in
          # the index before returning, so the next one resolves it.
          for crate in vgi-core verify-trust did-git-sign; do
            echo "::group::publish ${crate}"
            cargo publish -p "${crate}" --locked
            echo "::endgroup::"
          done
